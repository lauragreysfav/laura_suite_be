services:
  postgres:
    image: postgres:16-alpine
    container_name: laura-postgres
    environment:
      POSTGRES_DB: laura
      POSTGRES_USER: laura
      POSTGRES_PASSWORD: L4oA1UqJs3HeQIan2pGOYMWD
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:5432:5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laura -d laura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: laura-redis
    ports:
      - 127.0.0.1:6379:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - OPENVPN_USER=OJIj0GKPTvxyZeZn
      - OPENVPN_PASSWORD=j9oi12t9Ahj3qG15rSsgqLqZAk5cNuXh
      - SERVER_COUNTRIES=Japan
      - FREE_ONLY=on
      - TZ=Asia/Kolkata
      - FIREWALL_OUTBOUND_SUBNETS=192.168.65.0/24
    ports:
      - 127.0.0.1:8191:8191
      - 9696:9696
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: "service:gluetun"
    environment:
      - LOG_LEVEL=info
      - TZ=Asia/Kolkata
    restart: unless-stopped

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      - APP_UID=1000
      - APP_GID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/prowlarr:/config
    depends_on:
      gluetun:
        condition: service_started
    restart: unless-stopped

  whisparr:
    image: ghcr.io/hotio/whisparr:latest
    container_name: whisparr
    environment:
      - APP_UID=1000
      - APP_GID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/whisparr:/config
      - ./torrents:/torrents
      - /mnt/host/d/LauraMedia:/data/lauramedia
    ports:
      - 6969:6969
    restart: unless-stopped

  stash:
    build:
      context: ./stash
      dockerfile: Dockerfile
    container_name: stash
    restart: unless-stopped
    ports:
      - "127.0.0.1:9999:9999"
    environment:
      - STASH_PORT=9999
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - STASH_FFMPEG_HWACCEL=true
      - STASH_FFMPEG_HWACCEL_TYPE=cuda
      - RCLONE_CONFIG=/etc/rclone.conf
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, compute, utility]
    volumes:
      - ./config/stash:/root/.stash
      - ./stash/metadata:/metadata
      - ./stash/cache:/cache
      - ./stash/generated:/generated
      - /mnt/host/d/LauraMedia:/data/lauramedia

  typesense:
    image: typesense/typesense:27.0
    container_name: laura-typesense
    ports:
      - 127.0.0.1:8108:8108
    environment:
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz}
      - TYPESENSE_DATA_DIR=/data
    volumes:
      - typesense_data:/data
    restart: unless-stopped

  laura-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laura-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./.env
    volumes:
      - .:/app
      - ./data:/data
    ports:
      - 127.0.0.1:8000:8000
    depends_on:
      typesense:
        condition: service_started
      stash:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  laura-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laura-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -E
    env_file:
      - ./.env
    volumes:
      - .:/app
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  laura-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laura-beat
    command: celery -A app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file:
      - ./.env
    volumes:
      - .:/app
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flower:
    image: mher/flower:latest
    container_name: laura-flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - 127.0.0.1:5555:5555
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-overhaul-postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-overhaul-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stash_ai_server
      POSTGRES_USER: stash_ai_server
      POSTGRES_PASSWORD: stash_ai_server
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stash_ai_server -d stash_ai_server"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ai_overhaul_postgres:/var/lib/postgresql/data

  ai-overhaul-backend:
    image: ghcr.io/skier233/stash-ai-server:latest
    container_name: ai-overhaul-backend
    restart: unless-stopped
    depends_on:
      ai-overhaul-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4153:4153"
    environment:
      AI_SERVER_DB_HOST: ai-overhaul-postgres
      AI_SERVER_DB_PORT: 5432
      AI_SERVER_DB_NAME: stash_ai_server
      AI_SERVER_DB_USER: stash_ai_server
      AI_SERVER_DB_PASSWORD: stash_ai_server
      AI_SERVER_HOST: 0.0.0.0
      AI_SERVER_PORT: 4153
      DOCKER: "true"
    volumes:
      - ./config/ai-overhaul:/app/data:rw
      - ./config/ai-overhaul/plugins:/app/plugins:rw
      - /mnt/host/d/LauraMedia:/app/stash:ro

  peek-stash-browser:
    image: carrotwaxr/peek-stash-browser:latest
    container_name: peek-stash-browser
    restart: unless-stopped
    ports:
      - "6970:80"
    environment:
      JWT_SECRET: pq7dKx2mN4vR8wYzAbCdEfGhIjKlMnOpQrStUuVwXyZ123
    volumes:
      - peek_data:/app/data

volumes:
  postgres_data:
  redis_data:
  typesense_data:
  ai_overhaul_postgres:
  peek_data:






