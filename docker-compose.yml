services:
  postgres:
    image: postgres:16-alpine
    container_name: laura-postgres
    environment:
      POSTGRES_DB: laura
      POSTGRES_USER: laura
      POSTGRES_PASSWORD: L4oA1UqJs3HeQIan2pGOYMWD
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:5432:5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laura -d laura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: laura-redis
    ports:
      - 127.0.0.1:6379:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - OPENVPN_USER=OJIj0GKPTvxyZeZn
      - OPENVPN_PASSWORD=j9oi12t9Ahj3qG15rSsgqLqZAk5cNuXh
      - SERVER_COUNTRIES=Netherlands
      - FREE_ONLY=on
      - TZ=Asia/Kolkata
    ports:
      - 127.0.0.1:8191:8191
      - 9696:9696
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: "service:gluetun"
    environment:
      - LOG_LEVEL=info
      - TZ=Asia/Kolkata
    restart: unless-stopped

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      - APP_UID=1000
      - APP_GID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/prowlarr:/config
    depends_on:
      gluetun:
        condition: service_started
    restart: unless-stopped

  whisparr:
    image: ghcr.io/hotio/whisparr:latest
    container_name: whisparr
    environment:
      - APP_UID=1000
      - APP_GID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/whisparr:/config
      - ./torrents:/torrents
      - D:\LauraMedia:/data/lauramedia
    ports:
      - 127.0.0.1:6969:6969
    restart: unless-stopped

  stash:
    build:
      context: ./stash
      dockerfile: Dockerfile
    container_name: stash
    restart: unless-stopped
    ports:
      - "127.0.0.1:9999:9999"
    environment:
      - STASH_PORT=9999
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - RCLONE_CONFIG=/etc/rclone.conf
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./config/stash:/root/.stash
      - ./stash/metadata:/metadata
      - ./stash/cache:/cache
      - ./stash/generated:/generated
      - D:\LauraMedia:/data/lauramedia

  laura-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laura-backend
    env_file:
      - ./.env
    volumes:
      - ./data:/data
    ports:
      - 127.0.0.1:8000:8000
    depends_on:
      stash:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  laura-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laura-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -E
    env_file:
      - ./.env
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  laura-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laura-beat
    command: celery -A app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file:
      - ./.env
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flower:
    image: mher/flower:latest
    container_name: laura-flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - 127.0.0.1:5555:5555
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:






