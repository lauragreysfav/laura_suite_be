services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - 127.0.0.1:8191:8191
    environment:
      - LOG_LEVEL=info
      - TZ=Asia/Kolkata
    restart: unless-stopped

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    environment:
      - APP_UID=1000
      - APP_GID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 127.0.0.1:9696:9696
    restart: unless-stopped

  whisparr:
    image: ghcr.io/hotio/whisparr:latest
    container_name: whisparr
    environment:
      - APP_UID=1000
      - APP_GID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/whisparr:/config
      - ./torrents:/torrents
      - D:\LauraMedia:/data/lauramedia
    ports:
      - 127.0.0.1:6969:6969
    restart: unless-stopped

  stash:
    build:
      context: ./stash
      dockerfile: Dockerfile
    container_name: stash
    restart: unless-stopped
    ports:
      - "127.0.0.1:9999:9999"
    environment:
      - STASH_PORT=9999
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - RCLONE_CONFIG=/etc/rclone.conf
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./config/stash:/root/.stash
      - ./stash/metadata:/metadata
      - ./stash/cache:/cache
      - ./stash/generated:/generated
      - D:\LauraMedia:/data/lauramedia

  laura-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: laura-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/data
    ports:
      - 127.0.0.1:8000:8000
    depends_on:
      - stash
    restart: unless-stopped
